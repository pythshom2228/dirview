name: Package

on:
  release:
    types: [published]

jobs:
  deb:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - run: |
          sudo apt update
          sudo apt install -y \
            debhelper \
            devscripts \
            qtbase5-dev \
            build-essential:native

      - run: dpkg-buildpackage -us -uc
      
      - name: Collect artifacts
        run: |
          mkdir -p artifacts
          cp ../*.deb artifacts/

      - name: Attach files to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/*.deb